<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Fluid Wall - Bronx Children's Museum</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        body.kiosk-mode { cursor: none !important; }
        #webcam { display: none; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #0a0a0a; z-index: 100; color: white; text-align: center; transition: opacity 0.8s;
        }
        h1 { font-size: 3rem; letter-spacing: 6px; font-weight: 200; margin-bottom: 10px; }
        p { color: #888; font-weight: 300; margin-bottom: 40px; letter-spacing: 1px; }
        
        button {
            padding: 15px 40px; font-size: 16px; cursor: pointer; letter-spacing: 2px;
            background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 4px; text-transform: uppercase; transition: 0.4s;
        }
        button:hover { background: white; color: black; box-shadow: 0 0 30px rgba(255,255,255,0.6); }
        
        #log { margin-top: 20px; font-family: monospace; font-size: 12px; color: #555; max-width: 80%; line-height: 1.5; text-align: left; background: #111; padding: 15px; border-radius: 5px;}
        .log-error { color: #ff5555; }
        .log-success { color: #55ff55; }
        
        .dg.ac { z-index: 50 !important; transition: opacity 0.3s; }
        body.kiosk-mode .dg.ac { opacity: 0; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h1>LIQUID LIGHT</h1>
        <p>Interactive Fluid Dynamics Simulation</p>
        <button id="startBtn">INITIALIZE SYSTEM</button>
        <div id="log">System standing by. Click to begin camera handshake.</div>
    </div>

    <!-- Hidden video element -->
    <video id="webcam" playsinline autoplay muted width="320" height="240"></video>

    <script>
        // --- LOGGING UTILITY ---
        const logBox = document.getElementById('log');
        function sysLog(msg, type = 'normal') {
            const colorClass = type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : '';
            logBox.innerHTML += `<div class="${colorClass}">> ${msg}</div>`;
            logBox.scrollTop = logBox.scrollHeight;
            console.log(msg);
        }

        // --- GLOBAL VARIABLES ---
        const video = document.getElementById('webcam');
        let scene, camera, renderer;
        let rtA, rtB; 
        let simulationMaterial, displayMaterial;
        let motionCanvas, mCtx, motionTexture;
        let lastFrame;
        let frameCount = 0;
        let fallbackMouseActive = false;
        let mouseX = 0, mouseY = 0;

        // --- ADMIN SETTINGS ---
        const settings = {
            dissipation: 0.95,
            swirlStrength: 2.0,
            colorIntensity: 2.5,
            motionSensitivity: 20,
            color1: '#00e5ff', // Cyan
            color2: '#a600ff', // Magenta
            bgBrightness: 0.05
        };

        // --- SETUP ADMIN DASHBOARD ---
        const gui = new dat.GUI({ width: 300 });
        const fFluid = gui.addFolder('Fluid Physics');
        fFluid.add(settings, 'dissipation', 0.80, 0.99).name('Fade Speed (Viscosity)');
        fFluid.add(settings, 'swirlStrength', 0.0, 5.0).name('Turbulence');
        fFluid.add(settings, 'motionSensitivity', 10, 100).name('Camera Threshold');
        
        const fColors = gui.addFolder('Aesthetics');
        fColors.addColor(settings, 'color1').name('Ink Color 1');
        fColors.addColor(settings, 'color2').name('Ink Color 2');
        fColors.add(settings, 'colorIntensity', 0.5, 5.0).name('Neon Glow');
        
        fFluid.open(); fColors.open();

        // --- FULLSCREEN KIOSK MODE ('F') ---
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.body.classList.add('kiosk-mode');
                } else {
                    document.exitFullscreen();
                    document.body.classList.remove('kiosk-mode');
                }
            }
        });

        // --- SYSTEM STARTUP (The Robust Handshake) ---
        document.getElementById('startBtn').addEventListener('click', () => {
            logBox.innerHTML = ""; // Clear log
