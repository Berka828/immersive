<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watercolor Bloom - Bronx Children's Museum</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fdfbf7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* The main drawing canvas */
        #artCanvas { display: block; width: 100vw; height: 100vh; }
        
        /* Hidden video for tracking */
        #webcam { display: none; }
        
        /* The Startup Overlay */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(253, 251, 247, 0.95); z-index: 100; color: #333; text-align: center;
            transition: opacity 0.8s ease;
        }
        
        h1 { font-size: 3.5rem; letter-spacing: 2px; font-weight: 300; margin-bottom: 10px; color: #2c3e50; }
        p { font-size: 1.2rem; color: #7f8c8d; font-weight: 300; margin-bottom: 40px; }
        
        button {
            padding: 18px 50px; font-size: 18px; cursor: pointer; letter-spacing: 1px;
            background: #3498db; color: white; border: none; border-radius: 50px;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        button:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4); }
        
        #log { margin-top: 20px; font-family: monospace; font-size: 14px; color: #e74c3c; max-width: 80%; }
        
        /* Kiosk Mode (Hides cursor) */
        body.kiosk-mode { cursor: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>WATERCOLOR BLOOM</h1>
        <p>Wave your arms to paint the canvas.</p>
        <button id="startBtn">START EXPERIENCE</button>
        <div id="log"></div>
    </div>

    <canvas id="artCanvas"></canvas>
    <video id="webcam" playsinline autoplay muted></video>

    <script>
        // --- SYSTEM VARIABLES ---
        const video = document.getElementById('webcam');
        const artCanvas = document.getElementById('artCanvas');
        const ctx = artCanvas.getContext('2d', { alpha: false }); // alpha:false optimizes performance
        const logBox = document.getElementById('log');
        
        let blooms = [];
        let motionCanvas, mCtx, lastFrameData;
        let isRunning = false;

        // --- COLOR PALETTES (Soft Watercolors) ---
        const colors = [
            'rgba(52, 152, 219, ',  // Soft Blue
            'rgba(46, 204, 113, ',  // Mint Green
            'rgba(155, 89, 182, ',  // Lavender
            'rgba(241, 196, 15, ',  // Warm Yellow
            'rgba(230, 126, 34, ',  // Soft Orange
            'rgba(231, 76, 60, '    // Rose Red
        ];

        // --- FULLSCREEN KIOSK MODE ('F' KEY) ---
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                    document.body.classList.add('kiosk-mode');
                } else {
                    document.exitFullscreen();
                    document.body.classList.remove('kiosk-mode');
                }
            }
        });

        // --- STARTUP LOGIC (Robust Camera Handshake) ---
        document.getElementById('startBtn').addEventListener('click', () => {
            logBox.innerText = "Requesting camera access...";
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                logBox.innerText = "Camera API blocked. Please ensure you are on a secure (HTTPS) connection.";
                return;
            }

            // Bare minimum request to maximize hardware compatibility
            navigator.mediaDevices.getUserMedia({ video: true })
                .then((stream) => {
                    video.srcObject = stream;
                    
                    video.addEventListener('playing', () => {
                        logBox.innerText = "";
                        const overlay = document.getElementById('overlay');
                        overlay.style.opacity = '0';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            initCanvas();
                        }, 800);
                    });

                    video.play().catch(e => {
                        logBox.innerText = "Autoplay prevented. Please interact with the page.";
                    });
                })
                .catch((err) => {
                    logBox.innerText = `Camera Error: ${err.message}. Please check browser permissions.`;
                });
        });

        // --- THE WATERCOLOR BLOOM CLASS ---
        class Bloom {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 5; // Starts small
                this.maxRadius = Math.random() * 150 + 100; // Grows large
                this.growthRate = Math.random() * 2 + 1; // Spreads slowly
                
                // Pick a random watercolor base
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
                
                this.opacity = 0.8; // Starts relatively opaque
                this.fadeRate = 0.002; // Fades very slowly into the paper
                this.active = true;
            }

            update() {
                // Grow the bloom
                if (this.radius < this.maxRadius) {
                    this.radius += this.growthRate;
                    this.growthRate *= 0.95; // Slows down as it gets bigger (like wet ink)
                }

                // Fade out over time
                this.opacity -= this.fadeRate;
                if (this.opacity <= 0.01) {
                    this.active = false; // Mark for deletion when invisible
                }
            }

            draw(context) {
                if (!this.active) return;

                context.beginPath();
                
                // Create a soft radial gradient for the watercolor effect
                const gradient = context.createRadialGradient(
                    this.x, this.y, 0, 
                    this.x, this.y, this.radius
                );
                
                // Center is slightly darker, edge fades out completely
                gradient.addColorStop(0, this.colorBase + this.opacity + ')');
                gradient.addColorStop(0.5, this.colorBase + (this.opacity * 0.5) + ')');
                gradient.addColorStop(1, this.colorBase + '0)');

                context.fillStyle = gradient;
                context.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                context.fill();
            }
        }

        // --- MAIN ENGINE INITIALIZATION ---
        function initCanvas() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // Fill canvas with "paper" color initially
            ctx.fillStyle = '#fdfbf7';
            ctx.fillRect(0, 0, artCanvas.width, artCanvas.height);

            // Setup Motion Tracking Canvas (Hidden)
            motionCanvas = document.createElement('canvas');
            motionCanvas.width = 64;  // Low resolution for fast processing
            motionCanvas.height = 48;
            mCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

            isRunning = true;
            trackMotion();
            animate();
        }

        function resizeCanvas() {
            artCanvas.width = window.innerWidth;
            artCanvas.height = window.innerHeight;
            // Re-fill paper color on resize so it doesn't turn black
            if(ctx) {
                ctx.fillStyle = '#fdfbf7';
                ctx.fillRect(0, 0, artCanvas.width, artCanvas.height);
            }
        }

        // --- MOTION TRACKING LOGIC ---
        function trackMotion() {
            if (!isRunning) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Draw current webcam frame to the tiny hidden canvas
                mCtx.drawImage(video, 0, 0, motionCanvas.width, motionCanvas.height);
                const currentFrameData = mCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);

                if (lastFrameData) {
                    // Look for significant movement
                    let motionDetected = false;
                    let motionX = 0;
                    let motionY = 0;
                    let pixelCount = 0;

                    // Step by 4 to check RGB/A values
                    for (let i = 0; i < currentFrameData.data.length; i += 16) { // Skip pixels for speed
                        const rDiff = Math.abs(currentFrameData.data[i] - lastFrameData.data[i]);
                        
                        // Threshold for movement (lower = more sensitive)
                        if (rDiff > 40) { 
                            const pixelIndex = i / 4;
                            const x = pixelIndex % motionCanvas.width;
                            const y = Math.floor(pixelIndex / motionCanvas.width);
                            
                            motionX += x;
                            motionY += y;
                            pixelCount++;
                            motionDetected = true;
                        }
                    }

                    // If a "chunk" of movement happened, spawn a bloom
                    // Requires at least 5 changed pixels to avoid noise/flicker creating paints
                    if (motionDetected && pixelCount > 5) {
                        // Average the position of the movement
                        const avgX = motionX / pixelCount;
                        const avgY = motionY / pixelCount;

                        // Map the tiny 64x48 coordinate to the massive screen coordinate
                        // IMPORTANT: We mirror the X axis so it acts like a mirror
                        const mappedX = (1.0 - (avgX / motionCanvas.width)) * artCanvas.width;
                        const mappedY = (avgY / motionCanvas.height) * artCanvas.height;

                        // Throttle bloom creation so it doesn't flood the screen instantly
                        if (Math.random() > 0.7) { 
                            blooms.push(new Bloom(mappedX, mappedY));
                        }
                    }
                }
                lastFrameData = currentFrameData;
            }

            // Run tracking 15 times a second (saves CPU, keeps movement deliberate)
            setTimeout(trackMotion, 1000 / 15); 
        }

        // --- ANIMATION RENDER LOOP ---
        function animate() {
            if (!isRunning) return;
            requestAnimationFrame(animate);

            // 1. Slowly fade the entire canvas back to the "paper" color
            // This prevents the screen from turning into a muddy brown mess over time
            ctx.fillStyle = 'rgba(253, 251, 247, 0.02)'; // Very transparent white
            ctx.fillRect(0, 0, artCanvas.width, artCanvas.height);

            // 2. Update and draw all active blooms
            // We use globalCompositeOperation to make colors multiply/darken like real ink
            ctx.globalCompositeOperation = 'multiply';
            
            for (let i = blooms.length - 1; i >= 0; i--) {
                let b = blooms[i];
                b.update();
                b.draw(ctx);
                
                // Remove dead blooms from array to save memory
                if (!b.active) {
                    blooms.splice(i, 1);
                }
            }
            
            // Reset composite operation so the fading background works correctly next frame
            ctx.globalCompositeOperation = 'source-over';
        }
    </script>
</body>
</html>
